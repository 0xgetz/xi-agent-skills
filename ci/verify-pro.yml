name: Verify Pro Trading System
on:
  push:
    paths: ['pro/**']
  pull_request:
    paths: ['pro/**']
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pinned, conflict-free dependencies
        run: pip install -r pro/requirements.txt
      - name: Run end-to-end system verification (must be 20/20)
        run: PYTHONPATH=. python pro/verify_system.py
